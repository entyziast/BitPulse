name: BitPulse CI/CD

on:
  push:
    branches: 
      - main

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres_test
          POSTGRES_PASSWORD: postgres_test
          POSTGRES_DB: bitpulse_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
        env:
          discovery.type: single-node
          xpack.security.enabled: false
        ports:
          - 9200:9200
        options: >-
          --health-cmd "curl http://localhost:9200/_cluster/health"
          --health-interval 20s
          --health-timeout 10s
          --health-retries 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Pytest
        env:
          PYTHONPATH: ./fastapi_app
          TEST_DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
          REDIS_URL: redis://localhost:6379/0
          ELASTICSEARCH_URL: http://localhost:9200
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          ALGORITHM: HS256
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          BOT_USERNAME: ${{ secrets.BOT_USERNAME }}
          BUCKET_CAPACITY: ${{ secrets.BUCKET_CAPACITY }}
          TOKENS_PER_SECOND: ${{ secrets.TOKENS_PER_SECOND }}
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }} # заглушка
        run: pytest -sv

  build-and-push:
    runs-on: ubuntu-latest
    needs: tests
    
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push FastAPI app
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/bitpulse-app:latest