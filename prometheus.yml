global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "bitpulse_app_job"
    static_configs:
      - targets: ["app:8000"]
      
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']