version: '3.8'

volumes:
  postgres_data:
  elastic_data:

services:
  # Основное приложение FastAPI
  app:
    build: .
    container_name: bitpulse_app
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - postgres
      - redis
      #- elasticsearch
    command: /app/entrypoint.sh 
    
  # Воркер Celery (выполняет задачи)
  worker:
    build: .
    container_name: bitpulse_worker
    env_file: .env
    volumes:
      - .:/app
    command: celery -A fastapi_app.worker.celery_app worker --loglevel=info
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_started
      app:
        condition: service_started
      elasticsearch:
        condition: service_healthy
      

  # Планировщик Celery (отправляет задачи по расписанию)
  beat:
    build: .
    container_name: bitpulse_beat
    env_file: .env
    volumes:
      - .:/app
    command: celery -A fastapi_app.worker.celery_app beat --loglevel=info
    depends_on:
      - redis
      - postgres
      - app

  # База данных PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: bitpulse_db
    restart: on-failure
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Redis (Broker для Celery и Кеш)
  redis:
    image: redis:7-alpine
    container_name: bitpulse_redis
    ports:
      - "6379:6379"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    container_name: bitpulse_elastic
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false # WARNING! Disable security for development only
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - logger.level=warn
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q 'status.*gold\\|green\\|yellow'"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "9200:9200"
    volumes:
      - elastic_data:/usr/share/elasticsearch/data

  flower:
    image: mher/flower:2.0
    container_name: bitpulse_flower
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
    ports:
      - "5555:5555"
    depends_on:
      - redis
      - worker

  kibana:
    image: docker.elastic.co/kibana/kibana:8.10.2
    container_name: bitpulse_kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - I18N_LOCALE=ru-RU
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch

  
