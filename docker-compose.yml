version: '3.8'

volumes:
  postgres_data:
  #elastic_data:

services:
  # Основное приложение FastAPI
  app:
    build: .
    container_name: bitpulse_app
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - postgres
      - redis
      #- elasticsearch
    command: ./entrypoint.sh 
    
  # Воркер Celery (выполняет задачи)
  worker:
    build: .
    container_name: bitpulse_worker
    env_file: .env
    volumes:
      - .:/app
    # Запускаем из модуля fastapi_app.worker (проверь путь к файлу с celery_app)
    command: celery -A fastapi_app.worker.celery_app worker --loglevel=info
    depends_on:
      - redis
      - postgres

  # Планировщик Celery (отправляет задачи по расписанию)
  beat:
    build: .
    container_name: bitpulse_beat
    env_file: .env
    volumes:
      - .:/app
    command: celery -A fastapi_app.worker.celery_app beat --loglevel=info
    depends_on:
      - redis

  # База данных PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: bitpulse_db
    restart: on-failure
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Redis (Broker для Celery и Кеш)
  redis:
    image: redis:7-alpine
    container_name: bitpulse_redis
    ports:
      - "6379:6379"

  
